# =============================================================================
# Smoke Test Pipeline
# =============================================================================
#
# Two layers of smoke testing:
#
#   1. Pytest smoke suite  (src/tests/test_smoke.py)
#      Fast in-process checks — no Docker required.
#      Run locally:  cd src && pytest -m smoke -v
#
#   2. HTTP smoke script   (.github/scripts/smoke-test.sh)
#      Hits a real running app over HTTP (docker compose in CI).
#      Run locally:
#        cd src && docker compose up -d --build
#        SMOKE_BASE_URL=http://localhost:8000 \
#        SMOKE_USERNAME=livingdevops SMOKE_PASSWORD=LivingDevops1! \
#        bash ../.github/scripts/smoke-test.sh
#
# Use after deploy to verify the app is alive before promoting traffic.
# =============================================================================

name: Smoke Test

on:
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "src/**"
  #     - ".github/workflows/smoke-test.yaml"
  #     - ".github/scripts/smoke-test.sh"
  # push:
  #   branches: [main]
  #   paths:
  #     - "src/**"
  #     - ".github/workflows/smoke-test.yaml"
  #     - ".github/scripts/smoke-test.sh"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Optional external URL (skips docker compose if set)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.13"
  APP_PORT: "8000"

jobs:
  pytest-smoke:
    name: Pytest Smoke Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run smoke tests
        env:
          DB_LINK: "sqlite:///:memory:"
        run: pytest -m smoke -v --tb=short

  http-smoke:
    name: HTTP Smoke (live app)
    runs-on: ubuntu-latest
    needs: [pytest-smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Start application with Docker Compose
        if: github.event_name != 'workflow_dispatch' || inputs.base_url == ''
        working-directory: src
        run: docker compose up -d --build --wait

      - name: Wait for health endpoint
        if: github.event_name != 'workflow_dispatch' || inputs.base_url == ''
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${APP_PORT}/health"; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          docker compose -f src/docker-compose.yaml logs
          exit 1

      - name: Run HTTP smoke tests
        env:
          SMOKE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url != '' && inputs.base_url || format('http://localhost:{0}', env.APP_PORT) }}
          SMOKE_USERNAME: livingdevops
          SMOKE_PASSWORD: LivingDevops1!
        run: bash .github/scripts/smoke-test.sh

      - name: Stop application
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.base_url == '')
        working-directory: src
        run: docker compose down -v
