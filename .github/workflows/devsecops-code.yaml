  workflow_dispatch:

concurrency:
  group: devsecops-code-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.13"
  WORKING_DIR: src

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff src"

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check src"

