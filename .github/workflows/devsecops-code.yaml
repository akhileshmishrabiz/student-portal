# =============================================================================
# DevSecOps - Code Pipeline
# =============================================================================
#
# Scans the Flask application in src/ for code quality and security issues.
#
# PREREQUISITES (one-time setup)
# -------------------------------
#
# 1. SonarQube on EC2 (remote server)
#    - Launch Amazon Linux 2023 EC2 and run:
#        sudo bash .github/scripts/setup-sonarqube.sh
#    - Open security group: inbound TCP 9000 (GitHub Actions needs to reach this port)
#    - UI: http://<EC2_PUBLIC_IP>:9000  (default login: admin / admin)
#
# 2. Create SonarQube project (Projects → Create Project → Manually)
#    - Project key:  student-portal          (must match src/sonar-project.properties)
#    - Display name: Student Portal Application
#
# 3. Generate SonarQube token
#    - Avatar → My Account → Security → Generate Token
#    - Type: User Token | Name: github-actions
#
# 4. Add GitHub repository secrets  (Settings → Secrets and variables → Actions)
#    - SONAR_TOKEN     → token from step 3
#    - SONAR_HOST_URL  → http://<EC2_PUBLIC_IP>:9000   (no trailing slash)
#      Example:        http://54.123.45.67:9000
#
# 5. SonarQube global permissions (if scan fails with "not authorized")
#    - Administration → Security → Global Permissions
#    - Grant your user: Create Projects + Execute Analysis
#
# JOBS
# ----
#   lint              Ruff format + lint checks
#   unit-tests        pytest with coverage (feeds SonarQube)
#   dependency-audit  pip-audit — known CVEs in Python dependencies
#   dockerfile-scan   Hadolint + Trivy config scan on Dockerfile
#   sonarqube         SonarQube SAST + quality gate (requires secrets above)
#   container-scan    Trivy CVE scan on built Docker image (main branch only)
#
# =============================================================================

name: DevSecOps - Code

on:
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "src/**"
  #     - ".github/workflows/devsecops-code.yaml"
  # push:
  #   branches: [main]
  #   paths:
  #     - "src/**"
  #     - ".github/workflows/devsecops-code.yaml"
  workflow_dispatch:

concurrency:
  group: devsecops-code-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.13"
  WORKING_DIR: src

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff src"

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check src"

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          # Quote required — trailing colon breaks YAML parsing otherwise
          DB_LINK: "sqlite:///:memory:"
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/coverage.xml
          retention-days: 7

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict

  dockerfile-scan:
    name: Dockerfile Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: src/Dockerfile
          failure-threshold: warning

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: src
          severity: CRITICAL,HIGH
          exit-code: "1"

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SonarQube connectivity
        run: |
          if [ -z "${SONAR_HOST_URL}" ]; then
            echo "::error::SONAR_HOST_URL secret is not set. Add http://<EC2_IP>:9000 in GitHub Secrets."
            exit 1
          fi
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::error::SONAR_TOKEN secret is not set."
            exit 1
          fi
          echo "Checking SonarQube at ${SONAR_HOST_URL} ..."
          curl -sf "${SONAR_HOST_URL}/api/system/status" | grep -q '"status":"UP"' || {
            echo "::error::Cannot reach SonarQube. Check EC2 is running, port 9000 is open in security group, and SONAR_HOST_URL is correct."
            exit 1
          }
          echo "SonarQube is reachable."

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: src

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # projectBaseDir: src — report-task.txt is written to .scannerwork/ at repo root
      # (see sonar.working.directory in src/sonar-project.properties)
      - name: SonarQube Scan
        id: sonar-scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: src

      - name: Locate report-task.txt
        if: always() && steps.sonar-scan.outcome == 'success'
        run: |
          mkdir -p .scannerwork
          if [ -f .scannerwork/report-task.txt ]; then
            echo "Found .scannerwork/report-task.txt"
          elif [ -f src/.scannerwork/report-task.txt ]; then
            cp src/.scannerwork/report-task.txt .scannerwork/report-task.txt
            echo "Copied from src/.scannerwork/report-task.txt"
          else
            REPORT="$(find . -name report-task.txt -type f | head -1)"
            if [ -n "${REPORT}" ]; then
              cp "${REPORT}" .scannerwork/report-task.txt
              echo "Copied from ${REPORT}"
            else
              echo "::error::report-task.txt not found after SonarQube scan. Check SonarQube Scan step logs."
              exit 1
            fi
          fi
          echo "--- report-task.txt ---"
          cat .scannerwork/report-task.txt

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2
        timeout-minutes: 5
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: [dockerfile-scan]
    # Image build + CVE scan is slower; run on main pushes only, not every PR
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t student-portal:${{ github.sha }} src

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_DISABLE_VEX_NOTICE: true
        with:
          image-ref: student-portal:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          scan-type: image
          exit-code: "1"
          ignore-unfixed: true
