# OWASP ZAP Automation Framework — authenticated DAST plan
# Used by: zaproxy/action-af@v0.3.0  (plan input)
#
# Required env vars (passed via docker_env_vars in workflow):
#   DAST_TARGET      e.g. http://35.154.27.18:8000
#   DAST_USERNAME    e.g. livingdevops
#   DAST_PASSWORD    e.g. LivingDevops1!
---
env:
  contexts:
    - name: student-portal
      urls:
        - "${DAST_TARGET}"
      includePaths:
        - "${DAST_TARGET}.*"
      excludePaths:
        - "${DAST_TARGET}/logout.*"
        - "${DAST_TARGET}/metrics.*"
      authentication:
        method: form
        parameters:
          loginPageUrl: "${DAST_TARGET}/login"
          loginRequestUrl: "${DAST_TARGET}/login"
          loginRequestBody: "username={%username%}&password={%password%}"
        users:
          - name: admin
            credentials:
              username: "${DAST_USERNAME}"
              password: "${DAST_PASSWORD}"
        verification:
          method: response
          pollFrequency: 60
          pollUnits: requests
          pollUrl: "${DAST_TARGET}/"
          loggedInRegex: "Dashboard|Welcome back|retro"
  parameters:
    failOnWarning: false
    failOnError: true

jobs:
  - type: spider
    parameters:
      context: student-portal
      user: admin
      maxDuration: 10
      url: "${DAST_TARGET}"

  - type: passiveScan-wait
    parameters:
      maxDuration: 10

  - type: activeScan
    parameters:
      context: student-portal
      user: admin
      maxRuleDurationInMins: 5
      maxScanDurationInMins: 15

  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk/
      reportFile: zap-auth-report.html

  - type: report
    parameters:
      template: sarif-json
      reportDir: /zap/wrk/
      reportFile: zap-auth-report.sarif
