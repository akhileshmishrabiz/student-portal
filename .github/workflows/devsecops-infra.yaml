name: DevSecOps - Infrastructure

on:
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "ecs-infra/**"
  #     - "k8s/**"
  #     - "kubernets/**"
  #     - ".github/workflows/devsecops-infra.yaml"
  #     - ".checkov.yaml"
  # push:
  #   branches: [main]
  #   paths:
  #     - "ecs-infra/**"
  #     - "k8s/**"
  #     - "kubernets/**"
  #     - ".github/workflows/devsecops-infra.yaml"
  #     - ".checkov.yaml"
  workflow_dispatch:

concurrency:
  group: devsecops-infra-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TERRAFORM_VERSION: "1.8.1"

jobs:
  terraform-ecs:
    name: ECS Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecs-infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ecs-infra
          soft_fail: false

  terraform-k8s:
    name: K8s Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: k8s/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: k8s/terraform
          soft_fail: false

  kubernetes-manifests:
    name: Kubernetes Manifest Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate k8s manifests
        run: |
          find k8s kubernets -name '*.yaml' -o -name '*.yml' | while read -r file; do
            echo "Validating $file"
            kubeconform -summary -ignore-missing-schemas "$file"
          done

  checkov-infra:
    name: Checkov Infra Scan
    runs-on: ubuntu-latest
    needs: [terraform-ecs, terraform-k8s, kubernetes-manifests]
    steps:
      - uses: actions/checkout@v4

      - name: Checkov - ECS Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ecs-infra
          framework: terraform
          config_file: .checkov.yaml
          soft_fail: false
          download_external_modules: true
          output_format: cli,sarif
          output_file_path: console,checkov-ecs.sarif

      - name: Checkov - K8s Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/terraform
          framework: terraform
          config_file: .checkov.yaml
          soft_fail: false
          download_external_modules: true
          output_format: cli,sarif
          output_file_path: console,checkov-k8s-tf.sarif

      - name: Checkov - Kubernetes manifests (k8s)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s
          framework: kubernetes
          config_file: .checkov.yaml
          soft_fail: false
          output_format: cli,sarif
          output_file_path: console,checkov-k8s.sarif

      - name: Checkov - Kubernetes manifests (kubernets)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: kubernets
          framework: kubernetes
          config_file: .checkov.yaml
          soft_fail: false
          output_format: cli,sarif
          output_file_path: console,checkov-kubernets.sarif

      - name: Upload Checkov SARIF artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-sarif-reports
          path: |
            checkov-ecs.sarif
            checkov-k8s-tf.sarif
            checkov-k8s.sarif
            checkov-kubernets.sarif
          retention-days: 14

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-ecs.sarif
          category: checkov-ecs

      - name: Upload K8s Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-k8s.sarif
          category: checkov-k8s

  sonarqube-ecs-infra:
    name: SonarQube - ECS Infra
    runs-on: ubuntu-latest
    needs: [checkov-infra]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ecs-infra

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sonarqube-k8s-infra:
    name: SonarQube - K8s Infra
    runs-on: ubuntu-latest
    needs: [checkov-infra]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: k8s

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
