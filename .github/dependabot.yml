version: 2

updates:
  - package-ecosystem: pip
    directory: /src
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "deps(pip)"

  - package-ecosystem: docker
    directory: /src
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "deps(docker)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "deps(actions)"

  - package-ecosystem: terraform
    directory: /ecs-infra
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "deps(terraform-ecs)"

  - package-ecosystem: terraform
    directory: /k8s/terraform
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "deps(terraform-k8s)"
