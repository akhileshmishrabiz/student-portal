services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=128MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=30
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      DB_LINK: postgresql://postgres:password@postgres:5432/mydb
      ADMIN_PASSWORD: LivingDevops1!
      GUNICORN_THREADS: "8"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "3"
      HEALTH_CACHE_SECONDS: "5"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
