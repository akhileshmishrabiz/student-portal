# Variant 3 — readiness + liveness probes on GET /health
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-portal-probes
  labels:
    app: devops-portal
    variant: probes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-portal
      variant: probes
  template:
    metadata:
      labels:
        app: devops-portal
        variant: probes
    spec:
      containers:
        - name: devops-portal
          image: student-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_LINK
              valueFrom:
                secretKeyRef:
                  name: devops-portal-secret
                  key: DB_LINK
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: devops-portal-secret
                  key: SECRET_KEY
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devops-portal-secret
                  key: ADMIN_PASSWORD
            - name: DEVOPS_CAPTAIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devops-portal-secret
                  key: DEVOPS_CAPTAIN_PASSWORD
            - name: LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: devops-portal-probes
  labels:
    app: devops-portal
    variant: probes
spec:
  type: ClusterIP
  selector:
    app: devops-portal
    variant: probes
  ports:
    - name: http
      port: 8000
      targetPort: 8000
