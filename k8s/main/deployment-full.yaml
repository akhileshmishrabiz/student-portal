# Variant 4 — production-style: resources, probes, PDB, anti-affinity, graceful shutdown
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-portal
  labels:
    app: devops-portal
    variant: full
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-portal
      variant: full
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops-portal
        variant: full
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: devops-portal
                    variant: full
                topologyKey: kubernetes.io/hostname
      containers:
        - name: devops-portal
          image: student-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: DB_LINK
              valueFrom:
                secretKeyRef:
                  name: devops-portal-secret
                  key: DB_LINK
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: devops-portal-secret
                  key: SECRET_KEY
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devops-portal-secret
                  key: ADMIN_PASSWORD
            - name: DEVOPS_CAPTAIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devops-portal-secret
                  key: DEVOPS_CAPTAIN_PASSWORD
            - name: LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 5
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: devops-portal
  labels:
    app: devops-portal
    variant: full
spec:
  type: LoadBalancer
  selector:
    app: devops-portal
    variant: full
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: devops-portal-pdb
  labels:
    app: devops-portal
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: devops-portal
      variant: full
