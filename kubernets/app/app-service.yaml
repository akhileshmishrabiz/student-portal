apiVersion: v1
kind: Service
metadata:
  name: student-portal-service
  namespace: testing-stuff
  labels:
    app: student-portal
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
      protocol: TCP
      name: http
  selector:
    app: student-portal
