apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: testing-stuff
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'minikube'
        namespace: 'testing-stuff'

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'student-portal-app'
        metrics_path: '/metrics'
        scrape_interval: 10s
        static_configs:
          - targets: ['student-portal-service:8000']
            labels:
              app: 'student-portal'
              environment: 'development'

      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['postgres-exporter:9187']
            labels:
              app: 'postgres'
